theme: jekyll-dash
title: ubermenchh (Umang Kaushik)
description: my site

plugins:
  - jekyll-tagging

# jekyll-tagging (optional)
tag_permalink_style: pretty
tag_page_layout: tag_page
tag_page_dir: tag

dash:
  date_format: "%b %-d, %Y"

  disqus:
    shortname: ubermenchh

  # generate social links in footer
  # supported colors: green, red, orange, blue, cyan, pink, teal, yellow, indigo, purple
  social_links:
    - url: https://x.com/ubermenchh_
      icon: twitter-square
      color: cyan
    - url: https://ubermenchh.github.io
      icon: itch-io
      color: red
    - url: https://github.com/ubermenchh
      icon: github-square
      color: purple
